name: Daily Regulatory Digest

on:
  schedule:
    # 09:00 IST = 03:30 UTC
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Lookback window in days'
        required: false
        default: '14'

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest agent
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '14' }}
          PYTHONUNBUFFERED: '1'
        run: python agent.py

      - name: Commit updated seen.json
        if: success()
        run: |
          git config user.name "regulatory-agent[bot]"
          git config user.email "regulatory-agent[bot]@users.noreply.github.com"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update seen hashes $(date -u +%Y-%m-%d)"
            git push
          fi
